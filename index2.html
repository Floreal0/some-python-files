<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>个人主页</title>
<style>
* {
  margin: 0;
  padding: 0;
  box-sizing: border-box;
}

:root {
  --bg: linear-gradient(135deg, #f8fafc, #e0f2fe, #f0f7ff, #f8f0ff);
  --card: rgba(255, 255, 255, 0.7);
  --card-border: rgba(255, 255, 255, 0.8);
  --text: #2d3748;
  --sub: #718096;
  --li: rgba(247, 249, 252, 0.8);
  --li-hover: rgba(230, 240, 255, 0.9);
  --foot: a0aec0;
  --switch-bg: rgba(255, 255, 255, 0.4);
  --switch-border: rgba(255, 255, 255, 0.6);
  --switch-knob-pos: 2px;
  --switch-text-color: #000000;
  --switch-time-color: #333333;
  --knob-bg: rgba(255, 255, 255, 0.95);
  --knob-shadow: 0 2px 8px rgba(0,0,0,0.15);
  --btn-bg: rgba(255, 255, 255, 0.25);
  --btn-hover: rgba(255, 255, 255, 0.4);
  --icon-color: #718096;
}

html[data-theme="dark"] {
  --bg: linear-gradient(135deg, #1e293b, #0f172a);
  --card: rgba(30, 41, 59, 0.7);
  --card-border: rgba(79, 70, 229, 0.3);
  --text: #f1f5f9;
  --sub: #cbd5e1;
  --li: rgba(51, 65, 85, 0.6);
  --li-hover: rgba(59, 130, 246, 0.2);
  --foot: #94a3b8;
  --switch-bg: rgba(15, 23, 42, 0.6);
  --switch-border: rgba(79, 70, 229, 0.5);
  --switch-knob-pos: 88px;
  --switch-text-color: rgba(255, 255, 255, 0.95);
  --switch-time-color: rgba(255,255,255,0.8);
  --knob-bg: rgba(30, 41, 59, 0.9);
  --knob-shadow: 0 2px 8px rgba(0,0,0,0.3);
  --btn-bg: rgba(255, 255, 255, 0.1);
  --btn-hover: rgba(255, 255, 255, 0.18);
  --icon-color: #cbd5e1;
}

body {
  font-family: "Microsoft YaHei", sans-serif;
  background: var(--bg);
  background-size: 400% 400%;
  min-height: 100vh;
  padding: 60px 20px;
  animation: bgFlow 25s ease-in-out infinite alternate;
  transition: all 0.4s ease;
}

@keyframes bgFlow {
  0% { background-position: 0% 50%; }
  50% { background-position: 100% 50%; }
  100% { background-position: 0% 50%; }
}

.container {
  max-width: 700px;
  margin: 0 auto;
}

.toggle-switch {
  position: fixed;
  top: 20px;
  right: 20px;
  width: 130px;
  height: 42px;
  border-radius: 50px;
  background: var(--switch-bg);
  backdrop-filter: blur(12px);
  -webkit-backdrop-filter: blur(12px);
  border: 1px solid var(--switch-border);
  box-shadow: 0 2px 15px rgba(0,0,0,0.08);
  z-index: 999;
  display: flex;
  align-items: center;
  padding: 0 4px;
  cursor: pointer;
  transition: all 0.6s cubic-bezier(0.4, 0, 0.2, 1);
  overflow: hidden;
}

.switch-knob {
  width: 38px;
  height: 38px;
  border-radius: 50%;
  background: var(--knob-bg);
  backdrop-filter: blur(4px);
  -webkit-backdrop-filter: blur(4px);
  display: flex;
  align-items: center;
  justify-content: center;
  position: absolute;
  left: var(--switch-knob-pos);
  transition: all 0.6s cubic-bezier(0.4, 0, 0, 1);
  box-shadow: var(--knob-shadow);
}

.icon-sun, .icon-moon {
  width: 20px;
  height: 20px;
  position: absolute;
  transition: opacity 0.4s ease, transform 0.4s ease;
}
.icon-sun {
  opacity: 1;
}
.icon-moon {
  opacity: 0;
}

html[data-theme="dark"] .icon-sun {
  opacity: 0;
  transform: rotate(90deg);
}
html[data-theme="dark"] .icon-moon {
  opacity: 1;
  transform: rotate(0deg);
}

.switch-text {
  position: absolute;
  left: 50%;
  top: calc(100% * 3/5);
  transform: translate(-50%, -50%);
  color: var(--switch-text-color);
  font-size: 14px;
  font-weight: 500;
  transition: all 0.4s ease;
}

.switch-time {
  position: absolute;
  top: 3px;
  left: 50%;
  transform: translateX(-50%);
  color: var(--switch-time-color);
  font-size: 10px;
  transition: all 0.4s ease;
}

.card {
  background: var(--card);
  border-radius: 20px;
  padding: 45px;
  backdrop-filter: blur(16px);
  -webkit-backdrop-filter: blur(16px);
  border: 1px solid var(--card-border);
  box-shadow: 0 8px 32px rgba(0, 0, 0, 0.1);
  animation: cardFadeIn 1s ease-out forwards;
  opacity: 0;
  transition: all 0.4s ease;
}

@keyframes cardFadeIn {
  to { opacity: 1; transform: translateY(0); }
  from { opacity: 0; transform: translateY(30px); }
}

h1 {
  font-size: 28px;
  color: var(--text);
  margin-bottom: 8px;
  animation: textFadeIn 1.2s ease-out forwards;
  opacity: 0;
}

.subtitle {
  color: var(--sub);
  margin-bottom: 40px;
  animation: textFadeIn 1.3s ease-out forwards;
  opacity: 0;
}

p {
  color: var(--sub);
  line-height: 1.8;
}

.section {
  margin-bottom: 30px;
  animation: sectionSlide 1.4s ease-out forwards;
  opacity: 0;
}

@keyframes textFadeIn {
  to { opacity: 1; transform: translateY(0); }
  from { opacity: 0; transform: translateY(10px); }
}
@keyframes sectionSlide {
  to { opacity: 1; transform: translateX(0); }
  from { opacity: 0; transform: translateX(-20px); }
}

.section h3 {
  font-size: 22px;
  color: var(--text);
  margin-bottom: 16px;
}

ul {
  list-style: none;
}

li {
  padding: 14px 18px;
  background: var(--li);
  color: var(--sub);
  border-radius: 12px;
  margin-bottom: 10px;
  transition: all 0.25s ease;
  cursor: pointer;
}

li:hover {
  background: var(--li-hover);
  color: var(--text);
  transform: translateX(6px);
}

li ul {
  padding-left: 20px;
  max-height: 0;
  opacity: 0;
  overflow: hidden;
  margin-top: 0;
  transition: all 0.3s ease;
}

li ul.show {
  max-height: 200px;
  opacity: 1;
  margin-top: 10px;
}

li ul li {
  background: var(--li);
  padding: 10px 14px;
  font-size: 14px;
  margin-bottom: 8px;
  cursor: default;
}

li ul li:hover {
  background: var(--li-hover);
  transform: translateX(4px);
}

/* ✅ 核心修复：输入框高度与列表项完全统一 */
.discourse-input {
  display: block;
  position: relative;
  padding: 14px 18px; /* 和li完全一致的内边距 */
  background: var(--li);
  border-radius: 12px;
  margin-bottom: 10px;
  transition: all 0.25s ease;
  min-height: 52px; /* 强制和上方列表项等高 */
}

/* 文本框样式：匹配单行高度 */
.discourse-input textarea {
  width: 100%;
  background: transparent;
  border: none;
  outline: none;
  color: var(--text);
  font-size: 16px;
  font-family: inherit;
  resize: none;
  height: 24px; /* 固定单行高度，不撑开容器 */
  line-height: 1.5;
  padding: 0 50px 0 0;
  overflow: hidden;
}

.discourse-input textarea::placeholder {
  color: var(--sub);
  opacity: 0.7;
}

/* 正方形按钮，位置不变 */
.discourse-input button {
  position: absolute;
  right: 14px;
  bottom: 14px;
  width: 36px;
  height: 36px;
  background: var(--btn-bg);
  border: none;
  border-radius: 8px;
  cursor: pointer;
  display: flex;
  align-items: center;
  justify-content: center;
  transition: all 0.25s ease;
  backdrop-filter: blur(4px);
  -webkit-backdrop-filter: blur(4px);
}

.discourse-input button:hover {
  background: var(--btn-hover);
}

.discourse-input button svg {
  width: 16px;
  height: 16px;
  stroke: var(--icon-color);
  fill: none;
  stroke-width: 2;
}

.footer {
  text-align: center;
  margin-top: 50px;
  font-size: 14px;
  color: var(--foot);
  animation: textFadeIn 1.6s ease-out forwards;
  opacity: 0;
}
</style>
</head>

<body>

<div class="toggle-switch" id="themeToggle">
  <div class="switch-knob" id="switchKnob">
    <svg class="icon-sun" viewBox="0 0 24 24" fill="none" stroke="#2d3748" stroke-width="2">
      <circle cx="12" cy="12" r="5"></circle>
      <line x1="12" y1="1" x2="12" y2="3"></line>
      <line x1="12" y1="21" x2="12" y2="23"></line>
      <line x1="4.22" y1="4.22" x2="5.64" y2="5.64"></line>
      <line x1="18.36" y1="18.36" x2="19.78" y2="19.78"></line>
      <line x1="1" y1="12" x2="3" y2=12></line>
      <line x1="21" y1="12" x2="23" y2="12"></line>
      <line x1="4.22" y1="19.78" x2="5.64" y2="18.36"></line>
      <line x1="18.36" y1="5.64" x2="19.78" y2="4.22"></line>
    </svg>
    <svg class="icon-moon" viewBox="0 0 24 24" fill="none" stroke="#f1f5f9" stroke-width="2">
      <path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"></path>
    </svg>
  </div>
  <div class="switch-time" id="switchTime"></div>
  <div class="switch-text" id="switchText">Day</div>
</div>

<div class="container">
  <div class="card">
    <h1>个人主页</h1>
    <p class="subtitle">Records & Drafts</p>

    <div class="section">
      <h3>Notes</h3>
      <ul>
        <li>Math Courses</li>
        <li class="parent-item">
          Projects
          <ul>
            <li>Modeling Templates</li>
            <li>Modeling Cases</li>
            <li>Misc</li>
          </ul>
        </li>
        <li>Materials</li>
      </ul>
    </div>

    <div class="section">
      <h3>Discourse</h3>
      <div class="discourse-input">
        <textarea placeholder="Leave a message..."></textarea>
        <button>
          <svg viewBox="0 0 24 24">
            <path d="M22 2L11 13M22 2l-7 20-4-9-9-4 20-7z"/>
          </svg>
        </button>
      </div>
    </div>
  </div>

  <div class="footer">© 2026 Personal Website</div>
</div>

<script>
const toggle = document.getElementById('themeToggle');
const switchText = document.getElementById('switchText');
const switchTime = document.getElementById('switchTime');
const html = document.documentElement;

function getCurrentTime() {
  const now = new Date();
  const hours = now.getHours();
  const minutes = now.getMinutes();
  return `${hours.toString().padStart(2,'0')}:${minutes.toString().padStart(2,'0')}`;
}

function updateTimeDisplay() {
  switchTime.textContent = getCurrentTime();
}

function loadTheme() {
  const savedTheme = localStorage.getItem('site-theme');
  if(savedTheme === 'dark') {
    html.setAttribute('data-theme','dark');
    switchText.textContent = 'Night';
  } else {
    html.removeAttribute('data-theme');
    switchText.textContent = 'Day';
  }
  updateTimeDisplay();
  setInterval(updateTimeDisplay, 1000);
}

toggle.addEventListener('click', () => {
  if (html.getAttribute('data-theme') !== 'dark') {
    html.setAttribute('data-theme','dark');
    localStorage.setItem('site-theme','dark');
    switchText.textContent = 'Night';
  } else {
    html.removeAttribute('data-theme');
    localStorage.setItem('site-theme','light');
    switchText.textContent = 'Day';
  }
});

// 修复：仅点击 Projects 本身切换展开/收起
document.querySelector('.parent-item').addEventListener('click', function(e){
  if(e.target === this) {
    this.querySelector('ul').classList.toggle('show');
  }
});

// 输入框自适应（输入多行时自动增高，默认单行和列表等高）
const textarea = document.querySelector('.discourse-input textarea');
function autoResizeTextarea() {
  textarea.style.height = '24px';
  textarea.style.height = Math.min(textarea.scrollHeight, 200) + 'px';
}

autoResizeTextarea();
textarea.addEventListener('input', autoResizeTextarea);
window.addEventListener('resize', autoResizeTextarea);

loadTheme();
</script>
</body>
</html>
